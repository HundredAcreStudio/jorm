# jorm configuration
# See README.md for full documentation

# Maximum retry attempts (0 = unlimited, runs until accepted or cancelled)
max_attempts: 0

# Default Claude model for the worker agent
# Options: sonnet, opus, haiku, or a full model ID
model: opus

# Default validator profile
profile: default

# Issue provider: "github", "linear", or "jira"
issue_provider: github

# Provider auth configuration
# token_var: env var name containing the token (preferred)
# token: hardcoded token value (token_var takes precedence)
providers:
  github:
    token_var: HUNDRED_ACRE_STUDIO_GITHUB_TOKEN

# Validator definitions
validators:
  # Run the project's test suite
  - id: tests
    name: Tests
    type: shell
    command: "CGO_ENABLED=1 go test ./..."
    on_fail: reject    # Block acceptance if tests fail
    timeout: 120s

  # Run go vet (non-blocking)
  - id: vet
    name: Vet
    type: shell
    command: "go vet ./..."
    on_fail: warn      # Report but don't block
    timeout: 30s
    parallel: true     # Can run concurrently with other parallel validators

  # Run golangci-lint (non-blocking)
  - id: lint
    name: Lint
    type: shell
    command: "golangci-lint run"
    on_fail: warn
    timeout: 60s
    parallel: true

  # Verify the project builds
  - id: build
    name: Build
    type: shell
    command: "CGO_ENABLED=1 go build ./..."
    on_fail: reject
    timeout: 60s

  # Claude-powered code quality review (blind validation)
  - id: pr-review
    name: PR Review
    type: claude
    prompt: "builtin:pr-review"
    on_fail: reject
    timeout: 300s

  # Claude-powered security review
  - id: security
    name: Security Review
    type: claude
    prompt: "builtin:security-review"
    on_fail: warn
    timeout: 120s
    parallel: true

  # Auto-commit via Claude (stages + writes conventional commit message)
  - id: commit
    name: Commit
    type: claude
    mode: action
    prompt: "builtin:commit"
    on_fail: reject
    run_on: accept_only
    timeout: 120s

# Profiles: named sets of validator IDs
profiles:
  default:
    - build
    - tests
    - pr-review
    - commit

  strict:
    - build
    - tests
    - vet
    - lint
    - security
    - pr-review
    - commit

  quick:
    - build
    - tests
    - commit

# Hooks run after the loop completes
hooks:
  on_complete:
    - "git push -u upstream HEAD"
    - "gh pr create --fill"
  on_failure: []
